# Nginx + Orthanc + Postgres development stack
#
# Provides the backend infrastructure for local OHIF development.
# Run OHIF on your host with `yarn dev` and access it through the
# nginx proxy at http://localhost:3001 to avoid CORS issues.
#
# Reference:
# - https://docs.docker.com/compose/compose-file

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - orthanc
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/init-pacs-db.sh:/docker-entrypoint-initdb.d/init-pacs-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orthanc"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/dicom-storage;
      echo 'Bucket dicom-storage ready';
      "

  orthanc:
    image: orthancteam/orthanc:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      ORTHANC__AWS_S3_STORAGE__VIRTUAL_ADDRESSING: "false"
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
      - ./config/orthanc.json:/etc/orthanc/orthanc.json:ro
    ports:
      - "8042:8042"
      - "4242:4242"

volumes:
  postgres-data:
  orthanc-storage:
  minio-data:

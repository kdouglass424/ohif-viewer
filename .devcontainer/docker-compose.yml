services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/ohif-viewer:cached
    environment:
      - APP_CONFIG=config/local_orthanc.js
    ports:
      - "3000:3000"
    command: sleep infinity

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
      - orthanc
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"

  orthanc:
    image: orthancteam/orthanc:latest
    restart: unless-stopped
    volumes:
      - orthanc-db:/var/lib/orthanc/db
      # https://orthanc.uclouvain.be/hg/orthanc/file/tip/OrthancServer/Resources/Configuration.json
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    ports:
      - "8042:8042" # Orthanc REST API + UI
      - "4242:4242" # DICOM (C-STORE, etc.)

volumes:
  orthanc-db:

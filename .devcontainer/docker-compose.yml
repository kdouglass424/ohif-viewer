services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/ohif-viewer:cached
    environment:
      - APP_CONFIG=config/local_orthanc.js
    ports:
      - "3000:3000"
    command: sleep infinity

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
      - orthanc
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "3001:80"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: orthanc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orthanc"]
      interval: 5s
      timeout: 5s
      retries: 10

  orthanc:
    image: orthancteam/orthanc:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - orthanc-storage:/var/lib/orthanc/db
      # https://orthanc.uclouvain.be/hg/orthanc/file/tip/OrthancServer/Resources/Configuration.json
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
    ports:
      - "8042:8042" # Orthanc REST API + UI
      - "4242:4242" # DICOM (C-STORE, etc.)

volumes:
  postgres-data:
  orthanc-storage:
